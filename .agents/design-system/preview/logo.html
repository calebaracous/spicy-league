<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Mark</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body {
      margin: 0;
      padding: 32px;
      font-family: var(--font-sans);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 48px;
    }
    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .logo-label {
      font-size: 10px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <svg width="64" height="64" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M 120 30 C 145 70, 180 90, 180 140 C 180 185, 155 215, 120 215 C 85 215, 60 185, 60 140 C 60 110, 78 95, 95 80 C 105 95, 110 105, 110 120 C 120 95, 115 60, 120 30 Z" fill="var(--accent)"/>
      <path d="M 120 90 C 138 115, 150 130, 150 155 C 150 180, 137 195, 120 195 C 103 195, 90 180, 90 158 C 90 145, 98 138, 108 130 C 113 145, 118 150, 120 145 C 120 130, 118 115, 120 90 Z" fill="var(--text)"/>
    </svg>
    <div class="logo-label">64px</div>
  </div>
  <div class="logo-container">
    <svg width="32" height="32" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M 120 30 C 145 70, 180 90, 180 140 C 180 185, 155 215, 120 215 C 85 215, 60 185, 60 140 C 60 110, 78 95, 95 80 C 105 95, 110 105, 110 120 C 120 95, 115 60, 120 30 Z" fill="var(--accent)"/>
      <path d="M 120 90 C 138 115, 150 130, 150 155 C 150 180, 137 195, 120 195 C 103 195, 90 180, 90 158 C 90 145, 98 138, 108 130 C 113 145, 118 150, 120 145 C 120 130, 118 115, 120 90 Z" fill="var(--text)"/>
    </svg>
    <div class="logo-label">32px</div>
  </div>
  <div class="logo-container">
    <svg width="20" height="20" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M 120 30 C 145 70, 180 90, 180 140 C 180 185, 155 215, 120 215 C 85 215, 60 185, 60 140 C 60 110, 78 95, 95 80 C 105 95, 110 105, 110 120 C 120 95, 115 60, 120 30 Z" fill="var(--accent)"/>
      <path d="M 120 90 C 138 115, 150 130, 150 155 C 150 180, 137 195, 120 195 C 103 195, 90 180, 90 158 C 90 145, 98 138, 108 130 C 113 145, 118 150, 120 145 C 120 130, 118 115, 120 90 Z" fill="var(--text)"/>
    </svg>
    <div class="logo-label">20px</div>
  </div>
</body>
</html>
